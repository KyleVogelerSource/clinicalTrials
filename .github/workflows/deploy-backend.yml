name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - '.github/workflows/deploy-backend.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  validate-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate AI provider secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          REQUIRE_AI_PROVIDER_SECRETS: "true"
        run: node scripts/validate-ai-provider-secrets.mjs

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        # Adjust if your backend uses a different test command

      - name: Build backend
        run: npm run build

  deploy-backend:
    needs: validate-backend
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_SHA_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          echo "Building backend image for commit $IMAGE_SHA_TAG"
          docker build -t ${{ secrets.ECR_REPOSITORY }} ./backend
          docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:$IMAGE_SHA_TAG
          docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Push Docker image
        run: |
          echo "Pushing image tags:"
          echo "  - ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:$IMAGE_SHA_TAG"
          echo "  - ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest"
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:$IMAGE_SHA_TAG
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Describe current App Runner service
        run: |
          aws apprunner describe-service \
            --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
            --query 'Service.{ServiceUrl:ServiceUrl,Status:Status,SourceConfiguration:SourceConfiguration}' \
            --output json

      - name: Deploy latest image to App Runner
        run: |
          echo "Starting App Runner deployment for commit $IMAGE_SHA_TAG"
          aws apprunner start-deployment \
            --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}"

      - name: Wait for backend readiness
        env:
          STATUS_URL: https://ppjtwpmmjp.us-east-1.awsapprunner.com/api/debug/status?refreshAiProviders=true
        run: |
          echo "Checking backend readiness at $STATUS_URL"

          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /tmp/status.json -w "%{http_code}" "$STATUS_URL" || true)

            if [ "$HTTP_CODE" = "200" ]; then
              OK=$(jq -r '.ok // false' /tmp/status.json)
              DB=$(jq -r '.databaseConnected // false' /tmp/status.json)
              ANTHROPIC=$(jq -r '.aiProviders.anthropic.reachable // false' /tmp/status.json)
              VOYAGE=$(jq -r '.aiProviders.voyage.reachable // false' /tmp/status.json)

              echo "Attempt $i: ok=$OK databaseConnected=$DB anthropicReachable=$ANTHROPIC voyageReachable=$VOYAGE"

              if [ "$OK" = "true" ] && [ "$DB" = "true" ] && [ "$ANTHROPIC" = "true" ] && [ "$VOYAGE" = "true" ]; then
                echo "Backend, DB, and AI providers are ready"
                cat /tmp/status.json
                exit 0
              fi
            else
              echo "Attempt $i: endpoint returned HTTP $HTTP_CODE"
            fi

            sleep 10
          done

          echo "Final status payload:"
          cat /tmp/status.json || true
          echo "::error title=Backend readiness failed::Backend did not become ready with DB and AI provider connectivity."
          exit 1

      - name: Write deployment summary
        if: success()
        run: |
          {
            echo "## Backend Deployment"
            echo ""
            echo "- Commit SHA: \`$IMAGE_SHA_TAG\`"
            echo "- Image tags pushed:"
            echo "  - \`${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:$IMAGE_SHA_TAG\`"
            echo "  - \`${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest\`"
            echo "- App Runner service: \`${{ secrets.APP_RUNNER_SERVICE_ARN }}\`"
            echo "- Health check URL: \`https://ppjtwpmmjp.us-east-1.awsapprunner.com/api/debug/status\`"
          } >> "$GITHUB_STEP_SUMMARY"
