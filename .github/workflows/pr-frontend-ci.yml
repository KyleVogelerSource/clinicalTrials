name: PR Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/pr-frontend-ci.yml'

permissions:
  contents: read

concurrency:
  group: pr-frontend-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-frontend-validate:
    name: pr-frontend-validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build -- --configuration production