name: PR Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - '.github/workflows/pr-backend-ci.yml'

permissions:
  contents: read

concurrency:
  group: pr-backend-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-backend-validate:
    name: pr-backend-validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate AI provider secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          REQUIRE_AI_PROVIDER_SECRETS: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: node scripts/validate-ai-provider-secrets.mjs

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build backend
        run: npm run build
