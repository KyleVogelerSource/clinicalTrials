services:
  postgres:
    image: postgres:16-alpine
    container_name: clinicaltrials-postgres
    environment:
      - POSTGRES_DB=clinicaltrials
      - POSTGRES_USER=clinicaltrials
      - POSTGRES_PASSWORD=clinicaltrials
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicaltrials -d clinicaltrials"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: clinicaltrials-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./backend:/app
      - ./shared:/shared:ro
      - backend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=clinicaltrials
      - DB_USER=clinicaltrials
      - DB_PASSWORD=clinicaltrials
      - DB_SSL=false
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: clinicaltrials-frontend
    working_dir: /app
    command: sh -c "npm install && npx ng serve frontend --host 0.0.0.0 --poll 1000"
    volumes:
      - ./frontend:/app
      - ./shared:/shared:ro
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  gateway:
    image: nginx:1.27-alpine
    container_name: clinicaltrials-gateway
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  k6:
    image: grafana/k6:0.53.0
    profiles:
      - load-test
    working_dir: /scripts
    command: ["run", "/scripts/${K6_SCRIPT:-smoke-local.js}"]
    volumes:
      - ./load-tests:/scripts:ro
    environment:
      - BASE_URL=http://backend:3000
      - VUS=${K6_VUS:-10}
      - DURATION=${K6_DURATION:-1m}
      - ENABLE_AI_BENCHMARK=${ENABLE_AI_BENCHMARK:-false}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_node_modules:
  frontend_node_modules:
  postgres_data:
