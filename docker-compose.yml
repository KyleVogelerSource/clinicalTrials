version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: clinical-trials-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinicaltrials
      POSTGRES_INITDB_ARGS: "-c log_statement=all"
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clinical-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinical-trials-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/clinicaltrials
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - clinical-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinical-trials-frontend
    restart: unless-stopped
    ports:
      - '4200:4200'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - clinical-network
    environment:
      ANGULAR_SERVE_PORT: 4200

volumes:
  db_data:
    driver: local

networks:
  clinical-network:
    driver: bridge
