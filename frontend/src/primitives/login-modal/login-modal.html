<div class="modal-backdrop" (click)="onBackdropClick($event)" role="dialog" aria-modal="true" [attr.aria-label]="mode() === 'login' ? 'Login' : 'Register'">
  <div class="modal-card">
    <button class="modal-close" (click)="closed.emit()" aria-label="Close">&times;</button>

    <div class="modal-tabs" role="tablist">
      <button role="tab" [class.active]="mode() === 'login'" (click)="setMode('login')">Log In</button>
      <button role="tab" [class.active]="mode() === 'register'" (click)="setMode('register')">Register</button>
    </div>

    <form (ngSubmit)="submit()" #authForm="ngForm" novalidate>
      @if (mode() === 'register') {
        <div class="form-row">
          <label for="firstName">First Name</label>
          <input
            id="firstName"
            name="firstName"
            type="text"
            [(ngModel)]="firstName"
            required
            autocomplete="given-name"
            placeholder="First name"
          />
        </div>
        <div class="form-row">
          <label for="lastName">Last Name</label>
          <input
            id="lastName"
            name="lastName"
            type="text"
            [(ngModel)]="lastName"
            required
            autocomplete="family-name"
            placeholder="Last name"
          />
        </div>
      }

      <div class="form-row">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          [(ngModel)]="username"
          required
          autocomplete="username"
          placeholder="Username"
        />
      </div>

      <div class="form-row">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
          placeholder="Password"
        />
      </div>

      @if (errorMessage()) {
        <p class="form-error" role="alert">{{ errorMessage() }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) { Submitting… } @else { {{ mode() === 'login' ? 'Log In' : 'Create Account' }} }
      </button>
    </form>
  </div>
</div>
