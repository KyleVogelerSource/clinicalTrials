<div class="multi-select-container" [id]="inputId()" [style.width]="width()">
    <div class="select-trigger" (click)="toggleDropdown()" [class.is-open]="isOpen()">
        <span class="selected-text">{{ getTriggerText() }}</span>
        <span class="chevron">▼</span>
    </div>

    @if (isOpen()) {
        <div class="dropdown-panel" 
            [class.align-right]="dropdownAlignment() === 'right'"
            [class.open-up]="openDirection() === 'up'"
            [class.open-down]="openDirection() === 'down'"
            [style.top.px]="panelTop()" 
            [style.left.px]="panelLeft()"
            [style.width.px]="panelWidth()">
            <ul class="options-list">
                @for (option of options(); track option.value) {
                    <li class="option-item" 
                        [class.selected]="isSelected(option.value)"
                        (click)="toggleOption(option.value, $event)">
                        <input 
                            type="checkbox" 
                            class="option-checkbox" 
                            [checked]="isSelected(option.value)"
                            (click)="$event.stopPropagation()"
                            (change)="toggleOption(option.value, $event)"
                        >
                        <span class="option-label" [class]="option.class || ''">{{ option.label }}</span>
                    </li>
                }
            </ul>
        </div>
    }
</div>
