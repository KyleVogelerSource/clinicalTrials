@if (loadingService.isLoading()) {
    <div class="loading-overlay" role="status" aria-live="polite">
        <div class="loading-container">
            <div class="spinner"></div>
            @if (loadingService.message(); as msg) {
                <p class="loading-message">{{ msg }}</p>
            }
        </div>
    </div>
}
