<div class="keyword-selector">
    <app-auto-complete-input
        [inputId]="inputId()"
        [placeholderText]="placeholderText()"
        [suggestions]="suggestions()"
        (searchQueryChange)="onSearchQueryChange($event)"
        (itemSelected)="onSelectSuggestion($event)"
    />

    <div class="selected-tags">
        @for (tag of selectedKeywords(); track tag) {
            <span class="tag">
                {{ tag }}
                <button type="button" class="remove-btn" (click)="onRemove(tag)">&times;</button>
            </span>
        }
    </div>
</div>
